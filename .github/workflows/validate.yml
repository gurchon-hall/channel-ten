name: TWD Validate scrapes

on:
  # Run every Sunday at 20:00 UTC
  schedule:
    - cron: "0 20 * * 0"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      full_validation:
        description: "Validate (rescrape) all decks on archive"
        required: false
        type: boolean
        default: false

jobs:
  pre-commit:
    uses: ./.github/workflows/pre-commit.yml

  validate:
    needs: pre-commit
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to eternal-vigilance

    steps:
      - name: Checkout channel-ten
        uses: actions/checkout@v7
        with:
          path: channel-ten

      - name: Checkout eternal-vigilance
        uses: actions/checkout@v7
        with:
          repository: gurchon-hall/eternal-vigilance
          token: ${{ secrets.PAT_TOKEN }}
          path: eternal-vigilance
          fetch-depth: 0   # full history for clean diffs

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Set UTF-8 encoding
        run: echo "PYTHONUTF8=1" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync --group dev --project ./channel-ten

      - name: Run tests
        working-directory: channel-ten
        run: uv run pytest

      - name: Validate Scraped tournaments
        continue-on-error: true
        run: |
          FLAGS="--twds-dir eternal-vigilance --verbose"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            FLAGS="$FLAGS --full-validation"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.full_validation }}" == "true" ]]; then
            FLAGS="$FLAGS --full-validation"
          fi
          uv run --project ./channel-ten channel-ten validate $FLAGS

      - name: Check for changes
        id: git_status
        working-directory: eternal-vigilance
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --staged --stat
          fi

      - name: Commit validation updates
        if: steps.git_status.outputs.changed == 'true'
        working-directory: eternal-vigilance
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: validate VTES TWD $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push


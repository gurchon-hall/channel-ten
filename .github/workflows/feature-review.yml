name: Copilot Feature Request Review

on:
  issues:
    types: [opened]

jobs:
  copilot-review:
    if: contains(github.event.issue.labels.*.name, 'enhancement')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Request Copilot feasibility review
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "@github-copilot Please review this feature request and provide:",
                "",
                "1. **Feasibility assessment** â€” is this technically feasible given the current codebase and architecture?",
                "2. **Suggested changes** â€” improvements or clarifications to the proposal before implementation begins.",
                "3. **Potential risks or blockers** â€” anything that could complicate the implementation.",
              ].join("\n")
            });

